services:
  - type: web
    name: box-junu
    env: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: true
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: CASHFREE_APP_ID
        sync: false
      - key: CASHFREE_SECRET_KEY
        sync: false
      - key: CASHFREE_API_URL
        value: https://api.cashfree.com/pg
      # Render free tier blocks SMTP (ports 587/465). Use Resend HTTP API instead.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: BoxCric <onboarding@resend.dev>
      - key: EMAIL_FROM
        value: BoxCric <assignurassignment@gmail.com>
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://boxcric.netlify.app

databases:
  - name: boxcric-db
    databaseName: boxcricket
    plan: free