services:
  - type: web
    name: box-junu
    env: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: true
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: BACKEND_URL
        value: https://boxcricket-booking.onrender.com
      - key: FRONTEND_URL
        value: https://boxcricket-booking.vercel.app
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: CricBox <onboarding@resend.dev>
      - key: EMAIL_FROM
        value: CricBox <assignurassignment@gmail.com>
      - key: JWT_SECRET
        sync: false

databases:
  - name: boxcric-db
    databaseName: boxcricket
    plan: free
